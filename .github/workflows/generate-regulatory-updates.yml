name: Generate Regulatory Updates

on:
  workflow_dispatch:
  schedule:
    # Ogni 3 giorni alle 06:00 italiane (05:00 UTC d'inverno / 04:00 UTC d'estate).
    # Cron usa giorno-del-mese con step di 3: 1, 4, 7, 10, 13, 16, 19, 22, 25, 28.
    - cron: '0 5 1,4,7,10,13,16,19,22,25,28 * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regulatory updates generation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_regulatory_updates.py

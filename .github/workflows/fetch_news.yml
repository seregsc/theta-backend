name: Fetch News
on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run news fetch
        env:
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py
      # ── Genera subito le immagini AI per le news appena caricate ──
      # Gira nella stessa macchina, subito dopo il caricamento: niente attesa.
      - name: Genera immagini news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_IMAGES: "12"
          PARALLEL: "6"
        run: |
          pip install requests supabase
          python generate_news_images.py

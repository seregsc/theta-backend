# In .github/workflows/backfill_prices_history.yml — Aggiungi questo trigger
on:
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Forza ricarica 5y per tutti'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * *'  # (lascia il tuo cron esistente)

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance supabase
      - run: python backfill_prices_history.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}

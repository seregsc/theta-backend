name: Discover Hardcoded Tickers

on:
  workflow_dispatch:
    inputs:
      appjsx_path:
        description: 'Path manuale ad App.jsx (lasciare vuoto per auto-detect)'
        required: false
        default: ''

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find App.jsx
        run: |
          echo "Path comuni:"
          ls -la App.jsx 2>/dev/null || true
          ls -la src/App.jsx 2>/dev/null || true
          ls -la frontend/src/App.jsx 2>/dev/null || true
          echo "Tutti gli App.jsx nel repo:"
          find . -name "App.jsx" -not -path "*/node_modules/*" -not -path "*/.git/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance

      - name: Run discovery
        env:
          APPJSX_PATH: ${{ github.event.inputs.appjsx_path }}
        run: python discover_hardcoded_tickers.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: hardcoded-tickers-classified
          path: /tmp/hardcoded_tickers_classified.csv
          if-no-files-found: warn

name: Generate Live Alerts (every 3h)

on:
  schedule:
    - cron: '15 */3 * * *'  # ogni 3 ore al minuto 15 (00:15, 03:15, 06:15, 09:15, 12:15, 15:15, 18:15, 21:15 UTC)
  workflow_dispatch:

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase anthropic requests

      - name: Run alerts generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_alerts.py

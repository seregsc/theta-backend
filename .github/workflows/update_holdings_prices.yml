name: Update Prices

on:
  schedule:
    # 5 run strategici al giorno feriale (UTC, sottrai 1h per IT inverno, 2h per estate):
    - cron: '30 7 * * 1-5'    # ~09:30 IT — apertura Borsa Italiana
    - cron: '0 10 * * 1-5'    # ~12:00 IT — metà mattina
    - cron: '30 13 * * 1-5'   # ~15:30 IT — apertura Wall Street
    - cron: '0 16 * * 1-5'    # ~18:00 IT — metà pomeriggio
    - cron: '30 19 * * 1-5'   # ~21:30 IT — pre-chiusura Wall Street
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_holdings_prices.py

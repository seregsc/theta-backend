name: Update Prices

on:
  schedule:
    # Ogni 30 minuti, lun-ven, dalle 07:00 alle 21:30 UTC
    # In ora italiana (UTC+1 inverno / UTC+2 estate):
    # - Inverno: 08:00-22:30 IT — copre Borsa Italiana (9:00-17:30) e Wall Street (15:30-22:00)
    # - Estate: 09:00-23:30 IT — copre Borsa Italiana e Wall Street
    # Totale: ~30 esecuzioni/giorno feriale, ~150/settimana
    - cron: '*/30 7-21 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_holdings_prices.py

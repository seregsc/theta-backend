name: Immagini News

on:
  # Parte AUTOMATICAMENTE quando finisce il workflow che carica le news.
  # Si attiva quando termina il workflow "fetch news".
  workflow_run:
    workflows: ["fetch news"]
    types:
      - completed

  # Avvio manuale sempre disponibile (Actions -> Immagini News -> Run workflow)
  workflow_dispatch:

  # Rete di sicurezza: ogni 6 ore, nel caso qualcosa sfugga
  schedule:
    - cron: "15 */6 * * *"

jobs:
  news-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run generate_news_images.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_IMAGES: "60"
        run: python generate_news_images.py
